name: Deploy website to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "build.py"
      - "content/**"
      - "templates/**"
      - "assets/**"
      - "styles.css"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # build.py is stdlib-only — no requirements.txt / pip install needed.
      - name: Build site
        run: python3 build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
